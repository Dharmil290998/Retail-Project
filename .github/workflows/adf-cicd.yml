name: ADF CI/CD Pipeline

concurrency:
  group: adf-cicd
  cancel-in-progress: true   # ensures only ONE active run

on:
  workflow_dispatch:   # ✅ manual trigger only

jobs:

  deploy-dev:
    runs-on: ubuntu-latest
    environment: DEV   # optional (for visibility)

    steps:
      - name: Checkout main
        uses: actions/checkout@v3

      - name: Checkout adf_publish
        uses: actions/checkout@v3
        with:
          ref: adf_publish
          path: adf_publish

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: >
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy DEV
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: ${{ secrets.AZURE_RG_DEV }}
          template: ./adf_publish/adfprojectdemo123/ARMTemplateForFactory.json
          parameters: >
            ./adf_publish/adfprojectdemo123/ARMTemplateParametersForFactory.json
            factoryName=adfprojectdemo123
          deploymentName: adf-dev-deployment


  deploy-test:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: TEST

    steps:
      - name: Checkout main
        uses: actions/checkout@v3

      - name: Checkout adf_publish
        uses: actions/checkout@v3
        with:
          ref: adf_publish
          path: adf_publish

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: >
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy TEST
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: ${{ secrets.AZURE_RG_DEV }}
          template: ./adf_publish/adfprojectdemo123/ARMTemplateForFactory.json
          parameters: >
            ./adf_publish/adfprojectdemo123/ARMTemplateParametersForFactory.json
            factoryName=adfprojectdemo123
          deploymentName: adf-test-deployment


  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-test
    environment: PROD   # 👈 important for approval

    steps:
      - name: Checkout main
        uses: actions/checkout@v3

      - name: Checkout adf_publish
        uses: actions/checkout@v3
        with:
          ref: adf_publish
          path: adf_publish

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: >
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy PROD
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: ${{ secrets.AZURE_RG_DEV }}
          template: ./adf_publish/adfprojectdemo123/ARMTemplateForFactory.json
          parameters: >
            ./adf_publish/adfprojectdemo123/ARMTemplateParametersForFactory.json
            factoryName=adfprojectdemo123
          deploymentName: adf-prod-deployment
